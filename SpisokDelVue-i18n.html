<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Список дел</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f5f5f5;
    }

    .lang-switcher {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .lang-switcher button {
      padding: 4px 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
    }

    .lang-switcher button.active {
      background: #4a90e2;
      color: white;
      border-color: #4a90e2;
    }

    input {
      padding: 8px;
      font-size: 15px;
      width: 70%;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      margin-left: 6px;
    }

    ul { padding: 0; margin-top: 16px; }

    li {
      list-style: none;
      background: white;
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 6px;
    }

    .done span { text-decoration: line-through; color: gray; }
    span { flex: 1; }

    .del {
      border: none;
      background: none;
      color: red;
      cursor: pointer;
      font-size: 16px;
    }

    p { color: gray; }
  </style>
</head>
<body>

<div id="app">

  <!-- переключатель языка -->
  <div class="lang-switcher">
    <button
      v-for="lang in langs"
      :key="lang"
      :class="{ active: $i18n.locale === lang }"
      @click="$i18n.locale = lang"
    >{{ lang.toUpperCase() }}</button>
  </div>

  <h2>{{ $t('title') }}</h2>

  <p>{{ $t('counter', { done, total }) }}</p>

  <div>
    <input v-model="newTodo" @keyup.enter="add" :placeholder="$t('placeholder')" />
    <button @click="add">{{ $t('add') }}</button>
  </div>

  <ul v-if="todos.length">
    <li v-for="todo in todos" :key="todo.id" :class="{ done: todo.done }">
      <input type="checkbox" :checked="todo.done" @change="toggle(todo.id)" />
      <span>{{ todo.text }}</span>
      <button class="del" @click="remove(todo.id)">✕</button>
    </li>
  </ul>

  <p v-else>{{ $t('empty') }}</p>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-i18n@9/dist/vue-i18n.global.js"></script>
<script>

  const { createApp, ref, computed } = Vue
  const { createI18n } = VueI18n

  // все переводы в одном месте - так проще
  const i18n = createI18n({
    locale: 'ru', // язык по умолчанию
    messages: {
      ru: {
        title:       'Список дел',
        placeholder: 'Новая задача...',
        add:         'Добавить',
        empty:       'Задач нет. Добавь первую!',
        // {done} и {total} подставляются автоматически
        counter:     'Выполнено: {done} из {total}',
      },
      en: {
        title:       'Todo List',
        placeholder: 'New task...',
        add:         'Add',
        empty:       'No tasks yet. Add your first one!',
        counter:     'Done: {done} of {total}',
      },
      de: {
        title:       'Aufgabenliste',
        placeholder: 'Neue Aufgabe...',
        add:         'Hinzufügen',
        empty:       'Keine Aufgaben. Füge eine hinzu!',
        counter:     'Erledigt: {done} von {total}',
      }
    }
  })

  createApp({
    setup() {
      const newTodo = ref('')

      // доступные языки - чтобы не хардкодить в шаблоне
      const langs = ['ru', 'en', 'de']

      const todos = ref([
        { id: 1, text: 'Купить продукты', done: false },
        { id: 2, text: 'Позвонить маме',  done: true  },
        { id: 3, text: 'Сделать домашку', done: false },
      ])

      function add() {
        if (!newTodo.value.trim()) return
        todos.value.push({ id: Date.now(), text: newTodo.value, done: false })
        newTodo.value = ''
      }

      function toggle(id) {
        const todo = todos.value.find(t => t.id === id)
        todo.done = !todo.done
      }

      function remove(id) {
        todos.value = todos.value.filter(t => t.id !== id)
      }

      const done  = computed(() => todos.value.filter(t =>  t.done).length)
      const total = computed(() => todos.value.length)

      return { newTodo, todos, langs, add, toggle, remove, done, total }
    }
  }).use(i18n).mount('#app')

</script>

</body>
</html>
